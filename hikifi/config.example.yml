server:
  bind_ip: "0.0.0.0"
  advertised_ip: "192.168.60.50"
  admin_port: 8090
  onvif_http_port_start: 8081
  discovery_enabled: true
  log_level: "info"
  # Optional: at startup, TCP-connect to each camera rtsp_url host:port (default 554)
  rtsp_connectivity_check_enabled: true
  rtsp_connectivity_check_timeout_seconds: 5

security:
  onvif_username: "unifi"
  onvif_password_env: "ONVIF_PASSWORD"

mode:
  restream_enabled: false
  mediamtx_base_url: "rtsp://192.168.60.50:8554"
  # Optional: append to direct RTSP URLs in GetStreamUri (e.g. "?tcp"). See README if live view stalls after one frame.
  # rtsp_stream_uri_suffix: "?tcp"

# Each camera's `name` is what clients show after "HikiFi " (WS-Discovery + ONVIF profile names).
# `manufacturer` / `model` below are optional notes for you; ONVIF identity uses HikiFi + `name`.
# Optional per camera: `advertised_ip` — LAN address UniFi should use for this virtual device only.
# If you run several cameras on one host, UniFi may show a single merged device unless each has a distinct IP.
# Example (uncomment and set real aliases on your OS):
#   advertised_ip: "192.168.60.51"
cameras:
  - id: "cam01"
    name: "Right Camera 1"
    manufacturer: "HikiFi"
    model: "Physical camera (your notes)"
    serial: "VHIK-CAM-001"
    rtsp_url: "rtsp://${HIK_USER}:${HIK_PASS}@192.168.60.32:554/Streaming/Channels/101"
    # Match ONVIF profile to the real stream (default H264). Use H265 when the NVR sends HEVC.
    # onvif_encoding: "H265"
    width: 1920
    height: 1080
    fps: 25

  - id: "cam02"
    name: "Right Camera 2"
    manufacturer: "HikiFi"
    model: "Physical camera (your notes)"
    serial: "VHIK-CAM-002"
    # advertised_ip: "192.168.60.52"
    rtsp_url: "rtsp://${HIK_USER}:${HIK_PASS}@192.168.60.32:554/Streaming/Channels/201"
    width: 1920
    height: 1080
    fps: 25
